<a href=/tags/>Tags</a></div></nav><div class=container><article><h1>Cron Local Mail</h1><p>To see the output from cron you need to have a Mail Transfer Agent (MTA) installed.</p><div class=highlight><pre tabindex=0 style=color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4><code class=language-bash data-lang=bash><span style=display:flex><span>sudo apt install postfix
</span></span></code></pre></div><p>Select the &ldquo;Local&rdquo; option during the installation process.</p><p>You can now debug cron jobs with the output:</p><div class=highlight><pre tabindex=0 style=color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4><code class=language-bash data-lang=bash><span style=display:flex><span>sudo tail -f /var/mail/$USER
</span></span></code></pre></div></article></div></body></html>
